<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="114" fill="#0A0F0D"/>
  <defs>
    <radialGradient id="bg2" cx="70%" cy="80%" r="80%">
      <stop offset="0%" stop-color="#1A2820"/>
      <stop offset="100%" stop-color="#0A0F0D"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="114" fill="url(#bg2)"/>

  <!-- grid de 4 blocos estilo dashboard -->
  <!-- bloco 1 topo-esq (ativo/lime) -->
  <rect x="96" y="96" width="140" height="140" rx="28" fill="#B8F04A"/>
  <!-- barras dentro do bloco 1 -->
  <rect x="120" y="176" width="24" height="40" rx="6" fill="#0A0F0D" opacity="0.5"/>
  <rect x="154" y="156" width="24" height="60" rx="6" fill="#0A0F0D" opacity="0.7"/>
  <rect x="188" y="136" width="24" height="80" rx="6" fill="#0A0F0D"/>

  <!-- bloco 2 topo-dir (escuro) -->
  <rect x="276" y="96" width="140" height="140" rx="28" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- check mark -->
  <polyline points="306,166 336,196 386,136" fill="none" stroke="#B8F04A" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- bloco 3 baixo-esq (escuro) -->
  <rect x="96" y="276" width="140" height="140" rx="28" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- seta de rota -->
  <path d="M136 346 Q166 306 236 346" fill="none" stroke="#B8F04A" stroke-width="11" stroke-linecap="round"/>
  <polygon points="224,326 236,346 214,348" fill="#B8F04A"/>

  <!-- bloco 4 baixo-dir (lime fraco) -->
  <rect x="276" y="276" width="140" height="140" rx="28" fill="rgba(184,240,74,0.12)" stroke="rgba(184,240,74,0.25)" stroke-width="1.5"/>
  <!-- cifrão estilizado -->
  <text x="346" y="362" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="72" fill="#B8F04A">$</text>
</svg>
